name: Daily HubSpot Pipeline

on:
  schedule:
    # This runs exactly at 9:00 AM IST (3:30 AM UTC)
    - cron: '5 5 * * *'
  workflow_dispatch: # This allows you to click a "Run" button manually to test it

jobs:
  execute-script:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Grab the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install the requests library
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the script securely
      - name: Run Pipeline
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python pipeline.py
